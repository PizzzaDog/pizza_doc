kind: usecase
id: uc
name: uses Foo via
actor: actor:sys
trigger: cron
steps:
  - from: module:ui/component:Home
    to: module:api/component:Receiver
    via: module:api/model:Foo
  - from: module:api/component:Receiver
    to: module:db/table:records
    protocol: sql
dataFlow:
  - sourceField: Foo.x
    targetField: records.x
