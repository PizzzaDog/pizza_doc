kind: usecase
id: uc
name: writes both columns
actor: actor:sys
trigger: cron
steps:
  - from: module:ui/component:Home
    to: module:db/table:users
    protocol: sql
dataFlow:
  - sourceField: Foo.email
    targetField: users.email
  - sourceField: Foo.passwordHash
    targetField: users.password_hash
