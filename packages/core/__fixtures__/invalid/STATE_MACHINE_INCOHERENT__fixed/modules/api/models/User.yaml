kind: model
id: User
name: User
modelKind: entity
persistedAs: module:db/domain:users/table:users
fields:
  - name: id
    type: uuid
  - name: email
    type: string
  - name: status
    type: string
stateMachine:
  field: status
  states: [ACTIVE, SUSPENDED, DELETED]
  initial: ACTIVE
  terminal: [DELETED]
  transitions:
    - from: ACTIVE
      to: [SUSPENDED, DELETED]
    - from: SUSPENDED
      to: [ACTIVE, DELETED]
