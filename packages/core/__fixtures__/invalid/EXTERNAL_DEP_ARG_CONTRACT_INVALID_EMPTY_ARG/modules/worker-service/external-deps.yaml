- name: legacy-worker-provision-script
  direction: outbound
  protocol: exec
  endpoint: /opt/example/provision-worker.sh
  consumer: module:worker-service
  auth: none
  preflightCheck:
    sourceRef: services/worker/src/preflight.ts#checkHostAssets
  positionalArgs:
    name: LegacyWorkerArgs
    contractTest:
      sourceRef: services/worker/src/legacy-adapter.test.ts:91
    args:
      - position: 1
        name: worker_id
        type: string
        nonempty: true
      - position: 2
        name: slot_id
        type: positive-int
      - position: 3
        name: worker_token
        type: secret
        secret: true
        nonempty: true
      - position: 4
        name: memory_mib
        type: positive-int
      - position: 5
        name: job_name
        type: string
        nonempty: true
      - position: 6
        name: resource_profile
        type: string
        nonempty: true
        defaultValue: ""
      - position: 7
        name: runtime
        type: enum
        enumValues: [RUNTIME_API, RUNTIME_OAUTH]
      - position: 8
        name: worker_count
        type: positive-int
        defaultValue: 1
      - position: 9
        name: runtime_auth_data_json
        type: json-object
        defaultValue: "{}"
