name: Release

# Gated behind manual dispatch until npm publish is wired up:
#   - NPM_TOKEN secret has to be set in repo Settings → Secrets
#   - GitHub Pages must be enabled (Settings → Pages → Source: GitHub Actions)
#   - At least one `.changeset/*.md` describing the release
# Once those are in place, switch back to `on: push: branches: [main]`.
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  pages: write

jobs:
  # -----------------------------------------------------------------------
  # Changesets: opens / updates a "Version Packages" PR, or — when such a
  # PR has just merged — publishes @pizza-doc/core (and any other public
  # workspace packages) to npm.
  # -----------------------------------------------------------------------
  release:
    name: Publish (changesets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -----------------------------------------------------------------------
  # Web bundle → GitHub Pages. Runs on every push to main so the site
  # tracks `main`; the URL also serves as the live demo link in README.
  # -----------------------------------------------------------------------
  pages-web:
    name: Deploy web bundle to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -----------------------------------------------------------------------
  # GitHub Release: whenever changesets publishes at least one package,
  # cut a GitHub Release with a ZIP of the built web bundle attached.
  # -----------------------------------------------------------------------
  github-release:
    name: Attach web bundle to GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @pizza-doc/core build && pnpm --filter @pizza-doc/web build

      - name: Zip web bundle
        run: |
          cd packages/web/dist
          zip -r ../../../pizza-doc-web.zip .
          cd -

      - name: Resolve version
        id: version
        run: |
          version=$(node -p "require('./packages/core/package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: docs/release-notes/v${{ steps.version.outputs.value }}.md
          files: pizza-doc-web.zip
          fail_on_unmatched_files: false
