kind: table
id: sessions
name: sessions
description: Active session tokens issued by login; expires_at lets us purge stale rows.
columns:
  - name: id
    sqlType: uuid
    primaryKey: true
  - name: user_id
    sqlType: uuid
    foreignKey:
      table: module:postgres-db/domain:users/table:users
      column: id
  - name: token
    sqlType: varchar(255)
    unique: true
  - name: expires_at
    sqlType: timestamptz
  - name: created_at
    sqlType: timestamptz
    default: now()
    description: Non-null; populated server-side (DB DEFAULT now()). Same v0.2 note as users.created_at.
indexes:
  - name: idx_sessions_token
    columns:
      - token
    unique: true
