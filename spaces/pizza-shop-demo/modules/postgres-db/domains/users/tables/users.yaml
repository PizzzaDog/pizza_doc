kind: table
id: users
name: users
description: One row per registered user; email is unique.
columns:
  - name: id
    sqlType: uuid
    primaryKey: true
  - name: email
    sqlType: varchar(255)
    unique: true
  - name: password_hash
    sqlType: varchar(255)
    description: Bcrypt hash; plaintext password is never stored.
  - name: display_name
    sqlType: varchar(100)
    nullable: true
  - name: created_at
    sqlType: timestamptz
    default: now()
    description: Non-null; populated server-side (DB DEFAULT now()).
indexes:
  - name: idx_users_email
    columns:
      - email
    unique: true
