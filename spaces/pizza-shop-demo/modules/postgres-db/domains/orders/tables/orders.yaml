kind: table
id: orders
name: orders
description: One row per placed order; total_cents is the final charged amount.
columns:
  - name: id
    sqlType: uuid
    primaryKey: true
  - name: user_id
    sqlType: uuid
    foreignKey:
      table: module:postgres-db/domain:users/table:users
      column: id
  - name: status
    sqlType: varchar(32)
    description: "Allowed values are the Order state machine's states: paid/preparing/delivered/cancelled (free varchar; the app-side whitelist is the SM on the Order entity). Rows are only ever inserted as 'paid'."
  - name: total_cents
    sqlType: int
  - name: stripe_charge_id
    sqlType: varchar(255)
    nullable: true
    description: Populated after a successful Stripe charge; null for failed or not-yet-charged orders.
  - name: created_at
    sqlType: timestamptz
    default: now()
    description: Non-null; populated server-side (DB DEFAULT now()). Same v0.2 note as users.created_at.
