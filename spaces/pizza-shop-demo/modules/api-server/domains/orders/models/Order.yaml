kind: model
id: Order
name: Order
modelKind: entity
persistedAs: module:postgres-db/domain:orders/table:orders
description: The persisted order aggregate. Items are embedded for simplicity; real projects may split into Order (persisted) + OrderAggregate (projected with items joined from order_items).
fields:
  - name: id
    type: uuid
  - name: userId
    type: uuid
  - name: status
    type: string
  - name: totalCents
    type: int
  - name: items
    type: List<OrderItem>
    persisted: false
    description: Aggregate embedding; joined from order_items, not stored on the orders row itself.
  - name: stripeChargeId
    type: string
    optional: true
stateMachine:
  field: status
  states:
    - paid
    - preparing
    - delivered
    - cancelled
  initial: paid
  terminal:
    - delivered
    - cancelled
  transitions:
    - from: paid
      to: preparing
      trigger: KitchenNotifier.onOrderPlaced
      actor: system
      description: The kitchen display accepts the ticket created from orders.placed.
    - from: paid
      to: cancelled
      trigger: support.refund
      actor: user
      guard: order has not started preparing
      description: Support refunds the Stripe charge and cancels the order.
    - from: preparing
      to: delivered
      trigger: courier.handoff
      actor: user
  scenarios:
    - id: kitchen-accepts-order
      given: an order persisted with status=paid
      when: the kitchen display accepts the ticket
      then:
        - status == preparing
    - id: refund-cancels-paid-order
      given: an order in status=paid that the kitchen has not accepted
      when: support triggers a refund
      then:
        - status == cancelled
        - the Stripe charge is refunded
    - id: redelivered-event-does-not-double-transition
      given: an order already in status=preparing
      when: orders.placed is redelivered for the same orderId
      then:
        - status == preparing
        - no second kitchen ticket exists
