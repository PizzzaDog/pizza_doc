kind: component
id: OrderController
name: OrderController
type: controller
description: HTTP entry point for checkout and personal order history. Both endpoints require a logged-in customer.
methods:
  - name: create
    params:
      - name: request
        type: CreateOrderRequest
    returns: OrderResponse
    httpMethod: POST
    httpPath: /api/orders
    routeAuth:
      type: user-jwt
      header: Authorization
    calls:
      - module:api-server/domain:orders/component:OrderService/method:place
    throws:
      - StripeDeclinedException
      - OutOfStockException
  - name: listMine
    returns: List<Order>
    httpMethod: GET
    httpPath: /api/orders
    routeAuth:
      type: user-jwt
      header: Authorization
    calls:
      - module:api-server/domain:orders/component:OrderRepository/method:findByUser
