kind: component
id: OrderService
name: OrderService
type: service
description: Orchestrates checkout — stock check, pricing, charge, persist, in that order.
methods:
  - name: place
    params:
      - name: request
        type: CreateOrderRequest
      - name: userId
        type: uuid
    returns: OrderResponse
    calls:
      - module:api-server/domain:menu/component:PizzaRepository/method:findById
      - module:api-server/domain:orders/component:PaymentGateway/method:charge
      - module:api-server/domain:orders/component:OrderRepository/method:save
    throws:
      - StripeDeclinedException
      - OutOfStockException
    description: For each item, verify the pizza is available and read current price; charge Stripe; persist the order. Rolls back persist if Stripe declines.
emits:
  - event: module:api-server/domain:orders/model:OrderPlaced
    description: Published after the orders/order_items transaction commits — never for declined or out-of-stock attempts.
