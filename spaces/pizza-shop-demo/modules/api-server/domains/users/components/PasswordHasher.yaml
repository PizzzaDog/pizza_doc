kind: component
id: PasswordHasher
name: PasswordHasher
type: infrastructure
description: Bcrypt wrapper; hash is one-way, verify compares a plaintext attempt to a stored hash.
methods:
  - name: hash
    params:
      - name: plaintext
        type: string
    returns: string
  - name: verify
    params:
      - name: plaintext
        type: string
      - name: hash
        type: string
    returns: boolean
